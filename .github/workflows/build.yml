name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build single-file executable
        shell: powershell
        run: .\build.ps1

      - name: Verify output
        shell: powershell
        run: |
          if (-not (Test-Path .\dist\SteamHelper.exe) -or
              (Get-Item .\dist\SteamHelper.exe).Length -eq 0) {
            throw 'Build output is missing or empty.'
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamHelper-windows
          path: dist/SteamHelper.exe
          if-no-files-found: error
